<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Marry Me?</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-hearts" id="background-hearts"></div>
    <div class="container" id="container">
        <h1 class="question">Will You Marry Me? Misti 💍</h1>
        <p class="sweet-text">Every moment with you feels like a dream I never want to wake up from. You are my
            sunshine, my world, and my everything. I can't imagine my future without you in it.</p>
        <div class="image-container">
            <!-- Reliable romantic cute bear image -->
            <img id="main-image" src="./main.png" alt="Cute romantic bear">
        </div>
        <div class="buttons">
            <button id="yes-btn" class="btn yes-btn">Yes!</button>
            <button id="no-btn" class="btn no-btn">No</button>
        </div>
    </div>

    <div id="success-container" class="hidden">
        <h1 class="success-text">Yay! I love you! ❤️</h1>
        <img src="./main.png" alt="Happy gif"
            style="display:none;"> <!-- preload -->
        <img id="success-image" src="./success.png"
            alt="Happy bear dancing">
    </div>

    <script src="script.js"></script>
</body>

</html>
