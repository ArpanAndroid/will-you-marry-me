<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Marry Me?</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-hearts" id="background-hearts"></div>
    <div class="container" id="container">
        <h1 class="question">Will You Marry Me? 💍</h1>
        <p class="sweet-text">Every moment with you feels like a dream I never want to wake up from. You are my sunshine, my world, and my everything. I can't imagine my future without you in it.</p>
        <div class="image-container">
            <!-- A placeholder cute image, will be replaced by user or a generic cute cat gif -->
            <img id="main-image" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExMjM4YWFiMzQzYmM0OWQwYzZiNjMwNjIxMmI0MmZiMDBjMzIzMWNjNSZlcD12MV9pbnRlcm5hbF9naWZzX2dpZklkJmN0PWc/MDJ9BpXXHwUYMTGvwD/giphy.gif" alt="Cute romantic gif">
        </div>
        <div class="buttons">
            <button id="yes-btn" class="btn yes-btn">Yes!</button>
            <button id="no-btn" class="btn no-btn">No</button>
        </div>
    </div>
    
    <div id="success-container" class="hidden">
        <h1 class="success-text">Yay! I love you! ❤️</h1>
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExcDEzMWVlMWY4N3g5MXEzZTk5NzM1NGNhOTQ5Njc3MWNmZWY3YzdmMSZlcD12MV9pbnRlcm5hbF9naWZzX2dpZklkJmN0PWc/MDJ9BpXXHwUYMTGvwD/giphy.gif" alt="Happy gif" style="display:none;"> <!-- preload -->
        <img id="success-image" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExeGJ3eHRyMmhwZ3Z2aW96Mnh1MnA1eHhqamR4aDF1aDhoMHhzYzFhNiZlcD12MV9pbnRlcm5hbF9naWZzX2dpZklkJmN0PWc/14urMYvPnI11m0/giphy.gif" alt="Happy gif">
    </div>

    <script src="script.js"></script>
</body>
</html>
